<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen bg-gray-100 flex items-center justify-center">

  <div class="w-full max-w-md bg-white rounded-lg shadow-lg p-8">
    <!-- Title -->
    <h2 class="text-2xl font-bold text-center mb-6">Connexion</h2>

    <!-- Form -->
    <form class="space-y-4">
      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" id="email" name="email"
          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" 
          placeholder="exemple@email.com">
      </div>

      <!-- Password -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700">Mot de passe</label>
        <input type="password" id="password" name="password"
          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" 
          placeholder="••••••••">
      </div>

      <!-- Forgot password -->
      <div class="text-right">
        <a href="#" class="text-sm text-indigo-600 hover:underline">Mot de passe oublié?</a>
      </div>

      <!-- Login button -->
      <button type="submit"
        class="w-full bg-indigo-600 text-white py-2 px-4 rounded-md hover:bg-indigo-700 transition">
        Se connecter
      </button>
    </form>

    <!-- Divider -->
    <div class="flex items-center my-6">
      <div class="grow border-t border-gray-300"></div>
      <span class="mx-2 text-gray-500 text-sm">ou</span>
      <div class="grow border-t border-gray-300"></div>
    </div>

    <!-- Social login -->
    <div class="space-y-3">
      <button class="w-full flex items-center justify-center border border-gray-300 rounded-md py-2 hover:bg-gray-50">
        <img src="https://www.svgrepo.com/show/355037/google.svg" class="w-5 h-5 mr-2" alt="Google"> Se connecter avec Google
      </button>
      <button class="w-full flex items-center justify-center border border-gray-300 rounded-md py-2 hover:bg-gray-50">
        <img src="https://www.svgrepo.com/show/452210/apple.svg" class="w-5 h-5 mr-2" alt="Apple"> Se connecter avec Apple
      </button>
      <button class="w-full flex items-center justify-center border border-gray-300 rounded-md py-2 hover:bg-gray-50">
        <img src="https://www.svgrepo.com/show/452196/facebook.svg" class="w-5 h-5 mr-2" alt="Facebook"> Se connecter avec Facebook
      </button>
    </div>

    <!-- Sign up -->
    <p class="mt-6 text-center text-sm text-gray-600">
      Vous avez pas de compte? 
      <a href="#" class="text-indigo-600 hover:underline">S’inscrire</a>
    </p>
  </div>

</body>
</html>
