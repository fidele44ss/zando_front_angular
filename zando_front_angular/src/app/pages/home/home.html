<div class="snap-y snap-mandatory scroll-smooth">
    <section class="snap-start">
        <app-carrousel></app-carrousel>
    </section>
    <section class="snap-start">
                <div class="flex h-screen">
                <!-- Hamburger button (mobile only) -->
                <button
                    class="md:hidden fixed top-4 left-4 z-50 px-3 py-2 bg-blue-600 text-white rounded"
                    (click)="toggleAside()"
                >
                    <!-- Icône hamburger -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>

                <!-- Sidebar -->
                @if (isAsideOpen) {
                    <aside
                                class="w-70 p-7  bg-[#95A5A6] text-black h-screen overflow-y-auto"
                                >
                                <h2 class="text-xl mt-6 font-bold mb-4 border-b border-gray-700 pb-2">
  <!-- Search bar -->
  <div class="relative">
    <input 
      type="text" 
      placeholder="Rechercher..." 
      class="w-full px-4 py-2 rounded-md border border-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
    />
    <span class="absolute right-3 top-2.5 text-gray-500">
      🔍
    </span>
  </div>
</h2>


                                <!-- Tri -->
                                <div class="mb-6">
                                    <label class="block mb-2 font-semibold">Trier par</label>
                                    <select class="w-full p-2 rounded bg-gray-700 text-white">
                                    <option value="popularity">Popularité</option>
                                    <option value="newest">Nouveautés</option>
                                    <option value="price_low">Prix croissant</option>
                                    <option value="price_high">Prix décroissant</option>
                                    </select>
                                </div>

                                <!-- Catégories -->
                                <div class="mb-6">
                                    <label class="block mb-2 font-semibold">Catégories</label>
                                    <ul class="space-y-2 space-x-3">
                                    <li><input type="checkbox" id="cat1" class="mx-4" /> <label for="cat1">Mode</label></li>
                                    <li><input type="checkbox" id="cat2" class="mx-4"/> <label for="cat2">Électronique</label></li>
                                    <li><input type="checkbox" id="cat3" class="mx-4"/> <label for="cat3">Maison</label></li>
                                    <li><input type="checkbox" id="cat4" class="mx-4"/> <label for="cat4">Beauté</label></li>
                                    </ul>
                                </div>

                                <!-- Prix -->
                        <div class="mb-6">
                                <label class="block mb-2 font-semibold">Prix</label>

                                <!-- Dual range slider -->
                                <div class="relative w-full">
                                    <!-- Min handle -->
                                    <input type="range"
                                        min="0" max="1000" step="50"
                                        [(ngModel)]="minValue"
                                        class="w-full appearance-none bg-transparent  " />

                                    <!-- Max handle -->
                                    <input type="range"
                                        min="0" max="1000" step="50"
                                        [(ngModel)]="maxValue"
                                        class="w-full appearance-none bg-transparent" />

                                    <!-- Track highlight -->
                                    <div class="absolute top-1/2 left-0 w-full h-1 bg-gray-300 rounded transform -translate-y-1/2">
                                    <div class="absolute h-1 bg-[#2596be] rounded"
                                        [style.left.%]="(minValue/1000)*100"
                                        [style.width.%]="((maxValue-minValue)/1000)*100"></div>
                                    </div>
                                </div>

                                <!-- Labels -->
                                <div class="flex justify-between text-sm mt-2">
                                    <span class="font-bold">{{minValue}} $</span>
                                    <span class="font-bold">{{maxValue}} $</span>
                    </div>
                    </div>


                  
                    </aside>
                }

                <!-- Main Content -->
                <main class="flex-1 overflow-y-auto bg-gray-100 p-6">

<div class="mt-6 flex flex-wrap justify-around">         
    <app-product-card></app-product-card>
    <app-product-card></app-product-card>
    <app-product-card></app-product-card>
    <app-product-card></app-product-card>
    <app-product-card></app-product-card>
    <app-product-card></app-product-card>
    <app-product-card></app-product-card>
    <app-product-card></app-product-card>
    <app-product-card></app-product-card>
</div>



                </main>


                </div>
</section>
</div>
