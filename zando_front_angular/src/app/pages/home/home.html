<div class="snap-y snap-mandatory scroll-smooth">
    <section class="snap-start">
        <app-carrousel></app-carrousel>
    </section>
    <section class="snap-start">
                <div class="flex h-screen">
                <!-- Hamburger button (mobile only) -->
                <button
                    class="md:hidden fixed top-4 left-4 z-50 px-3 py-2 bg-blue-600 text-white rounded"
                    (click)="toggleAside()"
                >
                    <!-- Icône hamburger -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>

                <!-- Sidebar -->
                @if (isAsideOpen) {
                    <aside
                                class="w-80 p-7  bg-[#f6f6f5] text-black h-screen overflow-y-auto"
                                >
                                <h2 class="text-xl mt-6 font-bold mb-4 border-b border-gray-700 pb-2">
  <!-- Search bar -->
  <div class="relative">
    <div class="flex items-center bg-white rounded-md px-2 focus-within:ring-2 focus-within:ring-[#009687]">
  <!-- Loupe Icon -->
  <svg xmlns="http://www.w3.org/2000/svg" 
       class="h-7 w-7 text-gray-500" 
       fill="none" 
       viewBox="0 0 24 24" 
       stroke="currentColor">
    <path stroke-linecap="round" 
          stroke-linejoin="round" 
          stroke-width="2" 
          d="M21 21l-4.35-4.35m0 0A7.5 7.5 0 1110.5 3a7.5 7.5 0 016.15 13.65z" />
  </svg>

  <!-- Input -->
  <input 
    type="text" 
    placeholder="Rechercher..." 
    class="w-full px-2 py-2 focus:outline-none"
  />
</div>




  </div>
</h2>


                                <!-- Tri -->
                              <div class="mb-6">
  <label class="block mb-2 font-semibold">Trier par</label>
  <select 
    class="w-full p-2 rounded-lg bg-white text-black border border-gray-300 focus:outline-none focus:ring-2 focus:ring-[#009687]"
  >
    <option value="popularity">Popularité</option>
    <option value="newest">Nouveautés</option>
    <option value="price_low">Prix croissant</option>
    <option value="price_high">Prix décroissant</option>
  </select>
</div>

                            

                                <!-- Prix -->
                        <div class="mb-6">
                                <label class="block mb-2 font-semibold">Prix</label>

                                <!-- Dual range slider -->
                                <div class="relative w-full">
                                    <!-- Min handle -->
                                    <input type="range"
                                        min="0" max="1000" step="50"
                                        [(ngModel)]="minValue"
                                        class="w-full appearance-none bg-transparent  " />

                                    <!-- Max handle -->
                                    <input type="range"
                                        min="0" max="1000" step="50"
                                        [(ngModel)]="maxValue"
                                        class="w-full appearance-none bg-transparent" />

                                    <!-- Track highlight -->
                                    <div class="absolute top-1/2 left-0 w-full h-1 bg-gray-300 rounded transform -translate-y-1/2">
                                    <div class="absolute h-1 bg-[#009687] rounded"
                                        [style.left.%]="(minValue/1000)*100"
                                        [style.width.%]="((maxValue-minValue)/1000)*100"></div>
                                    </div>
                                </div>

                                <!-- Labels -->
                                <div class="flex justify-between text-sm mt-2">
                                    <span class="font-bold">{{minValue}} $</span>
                                    <span class="font-bold">{{maxValue}} $</span>
                    </div>
                    </div>


                  
                    </aside>
                }

                <!-- Main Content -->
                <main class="flex-1 overflow-y-auto bg-[#f5f5f5] p-6">

<div class="mt-6 flex flex-wrap justify-around">         
    <app-product-card></app-product-card>
    <app-product-card></app-product-card>
    <app-product-card></app-product-card>
    <app-product-card></app-product-card>
    <app-product-card></app-product-card>
    <app-product-card></app-product-card>
    <app-product-card></app-product-card>
    <app-product-card></app-product-card>
    <app-product-card></app-product-card>
    <app-product-card></app-product-card>
</div>



                </main>


                </div>
</section>
</div>
